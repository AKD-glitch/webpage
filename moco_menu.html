<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moco N' Lukes Haus — Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'EB Garamond', serif;
    overflow: hidden;
    user-select: none;
  }

  /* Ambient background glow */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(45,80,60,0.35) 0%, transparent 70%);
    pointer-events: none;
  }

  .scene {
    perspective: 2000px;
    width: 420px;
    height: 600px;
    position: relative;
  }

  /* Book shadow */
  .scene::after {
    content: '';
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    height: 20px;
    background: rgba(0,0,0,0.55);
    filter: blur(14px);
    border-radius: 50%;
  }

  .book {
    width: 420px;
    height: 600px;
    position: relative;
    transform-style: preserve-3d;
  }

  /* Each page is absolutely stacked */
  .page {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border-radius: 3px 16px 16px 3px;
    background: #1e3a2f;
    border: 1.5px solid rgba(210,185,130,0.25);
    overflow: hidden;
    transform-origin: left center;
    transform-style: preserve-3d;
    backface-visibility: hidden;
    transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1.000),
                box-shadow 0.8s ease;
    box-shadow: 4px 0 18px rgba(0,0,0,0.5);
    /* stack pages: first page on top */
  }

  .page.flipped {
    transform: rotateY(-180deg);
    box-shadow: -4px 0 18px rgba(0,0,0,0.5);
  }

  /* Page content front face */
  .page-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    padding: 28px 26px 24px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Back face (decorative back of flipped page) */
  .page-back {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    transform: rotateY(180deg);
    background: #1a3228;
    border-radius: 3px 16px 16px 3px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .page-back-pattern {
    width: 90%;
    height: 90%;
    border: 1px solid rgba(210,185,130,0.12);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.4;
  }

  /* Decorative corner ornaments */
  .corner {
    position: absolute;
    width: 28px;
    height: 28px;
    opacity: 0.45;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner.tl { top: 10px; left: 10px; }
  .corner.tr { top: 10px; right: 10px; transform: scaleX(-1); }
  .corner.bl { bottom: 10px; left: 10px; transform: scaleY(-1); }
  .corner.br { bottom: 10px; right: 10px; transform: scale(-1,-1); }

  /* Header */
  .menu-header {
    text-align: center;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(210,185,130,0.2);
  }

  .brand-name {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 600;
    color: #d2b982;
    letter-spacing: 3px;
    line-height: 1.2;
  }

  .brand-tagline {
    font-family: 'EB Garamond', serif;
    font-size: 9px;
    color: rgba(210,185,130,0.55);
    letter-spacing: 3.5px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  /* Section heading */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: #d2b982;
    letter-spacing: 1px;
    margin-bottom: 12px;
    line-height: 1;
  }

  .section-subtitle {
    font-family: 'EB Garamond', serif;
    font-style: italic;
    font-size: 13px;
    color: rgba(210,185,130,0.55);
    margin-bottom: 10px;
    letter-spacing: 1px;
  }

  /* Menu items */
  .menu-items { flex: 1; overflow: hidden; }

  .menu-row {
    display: flex;
    align-items: baseline;
    padding: 5px 0;
    border-bottom: 1px solid rgba(210,185,130,0.08);
  }

  .menu-row:last-child { border-bottom: none; }

  .item-name {
    font-family: 'Cinzel', serif;
    font-size: 10.5px;
    font-weight: 400;
    color: #e8dcc0;
    letter-spacing: 0.8px;
    flex: 1;
    line-height: 1.3;
  }

  .item-dots {
    flex: 0 0 auto;
    width: 40px;
    border-bottom: 1px dotted rgba(210,185,130,0.2);
    margin: 0 6px;
    position: relative;
    top: -3px;
  }

  .item-price {
    font-family: 'EB Garamond', serif;
    font-size: 13px;
    color: #d2b982;
    white-space: nowrap;
    min-width: 52px;
    text-align: right;
  }

  .item-desc {
    font-size: 8.5px;
    color: rgba(210,185,130,0.4);
    font-style: italic;
    letter-spacing: 0.3px;
    margin-top: 1px;
    line-height: 1.3;
  }

  .divider {
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(210,185,130,0.25), transparent);
    margin: 10px 0;
  }

  .jumbo-badge {
    background: rgba(210,185,130,0.12);
    border: 1px solid rgba(210,185,130,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    color: #d2b982;
    letter-spacing: 1.5px;
    display: inline-block;
    margin-bottom: 10px;
  }

  /* Navigation */
  .nav {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 22px;
  }

  .nav-btn {
    background: rgba(210,185,130,0.1);
    border: 1px solid rgba(210,185,130,0.3);
    color: #d2b982;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 10px 22px;
    border-radius: 2px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    flex: 1;
    text-align: center;
  }

  .nav-btn:hover { background: rgba(210,185,130,0.2); }
  .nav-btn:active { transform: scale(0.97); }
  .nav-btn:disabled { opacity: 0.25; cursor: default; }

  .page-indicator {
    font-family: 'EB Garamond', serif;
    font-size: 12px;
    color: rgba(210,185,130,0.5);
    letter-spacing: 2px;
    white-space: nowrap;
  }

  /* Page turn shimmer effect */
  .page.turning {
    filter: brightness(0.85);
  }

  /* Fold line shadow on page */
  .page-face::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 12px; height: 100%;
    background: linear-gradient(to right, rgba(0,0,0,0.18), transparent);
    pointer-events: none;
  }

  /* Price variant small */
  .price-variants {
    font-size: 10px;
    color: rgba(210,185,130,0.6);
    font-style: italic;
  }
</style>
</head>

<div class="scene">

const total = PAGES.length;
let current = 0; // index of the currently shown page (0-based)
let animating = false;

const book = document.getElementById('book');

// Build all pages stacked. Page 0 is on top (z-index = total), page n-1 is at bottom.
// We render them in reverse so page 0 is visually on top.
const pageEls = [];

for (let i = total - 1; i >= 0; i--) {
  const pageEl = document.createElement('div');
  pageEl.className = 'page';
  pageEl.style.zIndex = total - i;

  // Front face
  const front = document.createElement('div');
  front.className = 'page-face';
  front.innerHTML = PAGES[i].html;

  // Back face (decorative)
  const back = document.createElement('div');
  back.className = 'page-back';
  back.innerHTML = `<div class="page-back-pattern"><svg width="60" height="60" viewBox="0 0 60 60" fill="none"><circle cx="30" cy="30" r="28" stroke="#d2b982" stroke-width="0.5"/><path d="M30 4 L30 56 M4 30 L56 30" stroke="#d2b982" stroke-width="0.3"/></svg></div>`;

  pageEl.appendChild(front);
  pageEl.appendChild(back);
  book.appendChild(pageEl);
  pageEls[i] = pageEl;
}

function updateNav() {
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === total - 1;
  document.getElementById('pageIndicator').textContent = `${current + 1} / ${total}`;
}

function nextPage() {
  if (animating || current >= total - 1) return;
  animating = true;
  const pageEl = pageEls[current];
  pageEl.classList.add('flipped');
  current++;
  updateNav();
  setTimeout(() => { animating = false; }, 850);
}

function prevPage() {
  if (animating || current <= 0) return;
  animating = true;
  current--;
  const pageEl = pageEls[current];
  pageEl.classList.remove('flipped');
  updateNav();
  setTimeout(() => { animating = false; }, 850);
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextPage();
  if (e.key === 'ArrowLeft') prevPage();
});

updateNav();
</script>
